<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>코스피 야간선물</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 0;
      overflow-x: hidden;
      background: #ffffff;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      width: min(1100px, 100%);
      margin: 0 auto;
      padding: 0;
    }

    .panel {
      display: block;
      width: 100%;
      height: auto;
      min-height: 280px;
      object-fit: contain;
      object-position: top center;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 6px 10px 8px;
      color: #94a3b8;
      font-size: 9px;
      line-height: 1.4;
    }

    .footer a {
      color: inherit;
      text-decoration: none;
    }

    .error {
      margin: 12px;
      padding: 28px 18px;
      border: 1px solid #fecaca;
      border-radius: 12px;
      background: #fff5f5;
      color: #991b1b;
      text-align: center;
      font-size: 13px;
      line-height: 1.65;
    }

    @media (max-width: 600px) {
      .panel { min-height: 220px; }
      .footer { flex-direction: column; gap: 2px; }
    }
  </style>
</head>
<body>
  <main class="wrap" id="wrap">
    <img
      id="panel"
      class="panel"
      src="panel.png"
      alt="코스피 야간선물 현재 가격과 시간대별 차트"
    >

    <footer class="footer">
      <span id="updatedAt">마지막 갱신 확인 중</span>
      <a
        href="https://www.hangon.co.kr/kospi-night-futures"
        target="_blank"
        rel="noopener noreferrer"
      >출처: Hang on!</a>
    </footer>
  </main>

  <script>
    async function loadData() {
      try {
        const response = await fetch(`data.json?t=${Date.now()}`);

        if (!response.ok) {
          throw new Error("갱신 정보를 불러오지 못했습니다.");
        }

        const data = await response.json();
        document.getElementById("updatedAt").textContent =
          `마지막 갱신: ${data.updatedAt}`;
        document.getElementById("panel").src =
          `panel.png?t=${Date.now()}`;
      } catch (error) {
        document.getElementById("wrap").innerHTML = `
          <div class="error">
            <strong>야간선물 패널을 표시하지 못했습니다.</strong><br><br>
            ${error.message}<br><br>
            GitHub Actions 실행 결과를 확인해 주세요.
          </div>
        `;
      }
    }

    loadData();
  </script>
</body>
</html>
