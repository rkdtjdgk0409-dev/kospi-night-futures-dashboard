<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>코스피 야간선물</title>

  <script src="https://cdn.plot.ly/plotly-3.0.1.min.js"></script>

  <style>
    :root {
      color-scheme: light;
      --text: #101827;
      --muted: #92a0b4;
      --up: #ff3545;
      --down: #2563eb;
      --line: #e5ebf3;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 0;
      overflow-x: hidden;
      background: #ffffff;
      color: var(--text);
      font-family:
        Pretendard,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    .dashboard {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 19px 24px 9px;
      background:
        radial-gradient(
          circle at 5% 0%,
          rgba(215, 234, 255, 0.88),
          transparent 31%
        ),
        radial-gradient(
          circle at 96% 3%,
          rgba(225, 239, 255, 0.8),
          transparent 29%
        ),
        linear-gradient(
          180deg,
          #f8fbff 0%,
          #ffffff 63%
        );
    }

    .header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 20px;
      margin-bottom: 3px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
    }

    .clock {
      width: 15px;
      height: 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1.4px solid #a6b5c8;
      border-radius: 50%;
      font-size: 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(25px, 4vw, 38px);
      font-style: italic;
      font-weight: 900;
      letter-spacing: -1.4px;
      line-height: 1.05;
    }

    .quote {
      min-width: 265px;
      text-align: right;
    }

    .price {
      color: var(--up);
      font-size: clamp(39px, 6vw, 59px);
      font-style: italic;
      font-weight: 900;
      letter-spacing: -2.5px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .price.down {
      color: var(--down);
    }

    .change {
      margin-top: 5px;
      color: var(--up);
      font-size: clamp(14px, 2vw, 18px);
      font-style: italic;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }

    .change.down {
      color: var(--down);
    }

    #chart {
      width: 100%;
      height: 430px;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 2px 3px 0;
      color: #9ba8ba;
      font-size: 9px;
      line-height: 1.45;
    }

    .footer a {
      color: inherit;
      text-decoration: none;
    }

    .error {
      padding: 35px 20px;
      border: 1px solid #fecaca;
      border-radius: 12px;
      background: #fff5f5;
      color: #991b1b;
      text-align: center;
      font-size: 13px;
      line-height: 1.65;
    }

    @media (max-width: 650px) {
      .dashboard {
        padding: 14px 10px 8px;
      }

      .header {
        grid-template-columns: 1fr;
        gap: 9px;
      }

      .quote {
        min-width: 0;
        text-align: left;
      }

      #chart {
        height: 400px;
      }

      .footer {
        flex-direction: column;
        gap: 2px;
      }
    }
  </style>
</head>

<body>
  <main class="dashboard" id="dashboard">
    <header class="header">
      <div>
        <div class="status">
          <span class="clock">◷</span>
          <span id="statusText">야간선물 데이터 불러오는 중</span>
        </div>

        <h1 id="title">코스피 야간선물</h1>
      </div>

      <div class="quote">
        <div class="price" id="price">—</div>
        <div class="change" id="change">—</div>
      </div>
    </header>

    <div id="chart"></div>

    <footer class="footer">
      <span id="updatedAt">마지막 갱신 확인 중</span>

      <span>
        <span id="collectionMethod"></span>
        ·
        <a
          href="https://www.hangon.co.kr/kospi-night-futures"
          target="_blank"
          rel="noopener noreferrer"
        >
          출처: Hang on!
        </a>
      </span>
    </footer>
  </main>

  <script>
    const numberFormat = new Intl.NumberFormat("ko-KR", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });

    function formatSigned(value) {
      const number = Number(value);

      if (!Number.isFinite(number)) {
        return "—";
      }

      const sign = number > 0 ? "+" : "";
      return `${sign}${numberFormat.format(number)}`;
    }

    function displayTime(value) {
      const date = new Date(value);

      return new Intl.DateTimeFormat(
        "ko-KR",
        {
          month: "numeric",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
          hour12: false,
          timeZone: "Asia/Seoul"
        }
      ).format(date);
    }

    function renderChart(data) {
      const rows = Array.isArray(data.rows)
        ? data.rows
        : [];

      if (rows.length === 0) {
        throw new Error(
          "표시할 시계열 데이터가 아직 없습니다."
        );
      }

      const isDown = Number(data.change) < 0;
      const lineColor = isDown
        ? "#2563eb"
        : "#ff4653";

      const fillColor = isDown
        ? "rgba(37,99,235,0.08)"
        : "rgba(255,70,83,0.08)";

      const trace = {
        type: "scatter",
        mode: "lines",
        x: rows.map(row => row.time),
        y: rows.map(row => row.price),
        line: {
          color: lineColor,
          width: 2.2,
          shape: "linear"
        },
        fill: "tozeroy",
        fillcolor: fillColor,
        hovertemplate:
          "%{x|%m.%d %H:%M}<br>" +
          "<b>%{y:,.2f}</b><extra></extra>"
      };

      const layout = {
        margin: {
          l: 54,
          r: 18,
          t: 24,
          b: 42
        },
        paper_bgcolor: "rgba(0,0,0,0)",
        plot_bgcolor: "rgba(0,0,0,0)",
        font: {
          family:
            'Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
          color: "#8c99ac",
          size: 10
        },
        showlegend: false,
        hovermode: "x unified",
        xaxis: {
          showgrid: false,
          zeroline: false,
          tickformat: "%m.%d %H:%M",
          nticks: 6,
          fixedrange: true
        },
        yaxis: {
          side: "left",
          showgrid: true,
          gridcolor: "#e8edf4",
          griddash: "dot",
          zeroline: false,
          tickformat: ",.2f",
          fixedrange: true,
          autorange: true
        }
      };

      Plotly.newPlot(
        "chart",
        [trace],
        layout,
        {
          responsive: true,
          displayModeBar: false,
          displaylogo: false
        }
      );
    }

    async function loadData() {
      try {
        const response = await fetch(
          `data.json?t=${Date.now()}`
        );

        if (!response.ok) {
          throw new Error(
            "갱신된 data.json을 불러오지 못했습니다."
          );
        }

        const data = await response.json();
        const isDown = Number(data.change) < 0;

        document.getElementById("title").textContent =
          data.title || "코스피 야간선물";

        document.getElementById("statusText").textContent =
          data.statusText || "야간선물 데이터";

        const price = document.getElementById("price");
        price.textContent = numberFormat.format(data.price);
        price.classList.toggle("down", isDown);

        const change = document.getElementById("change");
        change.textContent =
          `${formatSigned(data.change)} ` +
          `(${formatSigned(data.changeRate)}%)`;
        change.classList.toggle("down", isDown);

        document.getElementById("updatedAt").textContent =
          `마지막 갱신: ${data.updatedAt}`;

        document.getElementById("collectionMethod").textContent =
          data.collectionMethod || "숫자 데이터 차트";

        renderChart(data);

      } catch (error) {
        document.getElementById("dashboard").innerHTML = `
          <div class="error">
            <strong>야간선물 데이터를 표시하지 못했습니다.</strong>
            <br><br>
            ${error.message}
            <br><br>
            GitHub Actions 실행 로그를 확인해 주세요.
          </div>
        `;
      }
    }

    loadData();
  </script>
</body>
</html>
