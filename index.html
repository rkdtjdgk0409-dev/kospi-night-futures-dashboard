<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>코스피 야간선물</title>
  <script src="https://cdn.plot.ly/plotly-3.0.1.min.js"></script>

  <style>
    :root {
      --ink: #101827;
      --muted: #9aa8ba;
      --up: #ff3d4d;
      --down: #347dff;
      --grid: #e3eaf3;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 0;
      margin: 0;
      overflow-x: hidden;
      background: #fff;
      color: var(--ink);
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .dashboard {
      width: min(1120px, 100%);
      min-height: 510px;
      margin: 0 auto;
      padding: 18px 24px 8px;
      background:
        radial-gradient(circle at 4% 0%, rgba(214, 234, 255, .95), transparent 32%),
        radial-gradient(circle at 96% 1%, rgba(226, 240, 255, .82), transparent 31%),
        linear-gradient(180deg, #f8fbff 0%, #fff 66%);
    }

    .header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(205px, auto);
      align-items: start;
      gap: 14px;
      margin-bottom: 2px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .clock {
      width: 15px;
      height: 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1.4px solid #aab8ca;
      border-radius: 50%;
      font-size: 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(25px, 4.1vw, 39px);
      font-style: italic;
      font-weight: 950;
      letter-spacing: -1.8px;
      line-height: 1.05;
      white-space: nowrap;
    }

    .quote { text-align: right; }

    .price {
      color: var(--up);
      font-size: clamp(37px, 6.1vw, 59px);
      font-style: italic;
      font-weight: 950;
      letter-spacing: -2.7px;
      line-height: .98;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .price.down, .change.down { color: var(--down); }

    .change {
      margin-top: 5px;
      color: var(--up);
      font-size: clamp(13px, 2vw, 18px);
      font-style: italic;
      font-weight: 900;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    #chart { width: 100%; height: 420px; }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 0 3px;
      color: #9ca9ba;
      font-size: 9px;
      line-height: 1.4;
    }

    .footer a { color: inherit; text-decoration: none; }

    .empty, .error {
      margin: 72px auto;
      max-width: 520px;
      padding: 24px;
      border-radius: 15px;
      text-align: center;
      font-size: 13px;
      line-height: 1.7;
    }

    .empty { background: rgba(234, 243, 255, .75); color: #55708f; }
    .error { border: 1px solid #fecaca; background: #fff5f5; color: #991b1b; }

    @media (max-width: 560px) {
      .dashboard { min-height: 465px; padding: 14px 10px 7px; }
      .header { grid-template-columns: minmax(0, 1fr) auto; gap: 7px; }
      .status { font-size: 9px; margin-bottom: 5px; }
      h1 { font-size: clamp(19px, 6vw, 27px); letter-spacing: -1.2px; }
      .price { font-size: clamp(27px, 9.7vw, 43px); letter-spacing: -1.9px; }
      .change { font-size: clamp(10px, 3.6vw, 14px); }
      #chart { height: 365px; }
      .footer { font-size: 8px; }
      .footer .method { display: none; }
    }
  </style>
</head>

<body>
  <main class="dashboard" id="dashboard">
    <header class="header">
      <div>
        <div class="status">
          <span class="clock">◷</span>
          <span id="statusText">야간선물 데이터 불러오는 중</span>
        </div>
        <h1 id="title">코스피 야간선물</h1>
      </div>

      <div class="quote">
        <div class="price" id="price">—</div>
        <div class="change" id="change">—</div>
      </div>
    </header>

    <div id="chart"></div>

    <footer class="footer">
      <span id="updatedAt">마지막 갱신 확인 중</span>
      <span class="method">
        <span id="period"></span>
        · <a href="https://www.hangon.co.kr/kospi-night-futures" target="_blank" rel="noopener">출처: Hang on!</a>
      </span>
    </footer>
  </main>

  <script>
    const nf = new Intl.NumberFormat("ko-KR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    function signed(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "—";
      return `${n > 0 ? "+" : ""}${nf.format(n)}`;
    }

    function arrow(value) {
      const n = Number(value);
      return n < 0 ? "↘" : n > 0 ? "↗" : "→";
    }

    function chartRange(rows) {
      const values = rows.map(row => Number(row.price)).filter(Number.isFinite);
      const low = Math.min(...values);
      const high = Math.max(...values);
      const pad = Math.max((high - low) * .12, Math.abs(high) * .0025, 1);
      return [low - pad, high + pad];
    }

    function renderChart(data) {
      const rows = Array.isArray(data.rows) ? data.rows : [];

      if (!rows.length) {
        document.getElementById("chart").innerHTML = `
          <div class="empty">GitHub Actions에서 <b>Run workflow</b>를 한 번 실행하면<br>원본 페이지와 같은 전체 기간의 차트가 표시됩니다.</div>`;
        return;
      }

      const isDown = Number(data.changeRate) < 0;
      const line = isDown ? "#347dff" : "#ff3d4d";
      const fill = isDown ? "rgba(52,125,255,.09)" : "rgba(255,61,77,.09)";
      const range = chartRange(rows);

      Plotly.newPlot("chart", [{
        type: "scatter",
        mode: "lines",
        x: rows.map(row => row.time),
        y: rows.map(row => row.price),
        line: { color: line, width: 2.25, shape: "linear" },
        fill: "tozeroy",
        fillcolor: fill,
        hovertemplate: "%{x|%m.%d %H:%M}<br><b>%{y:,.2f}</b><extra></extra>"
      }], {
        margin: { l: 51, r: 16, t: 24, b: 42 },
        paper_bgcolor: "rgba(0,0,0,0)",
        plot_bgcolor: "rgba(0,0,0,0)",
        font: { family: 'Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif', color: "#929fb1", size: 10 },
        showlegend: false,
        hovermode: "x unified",
        xaxis: {
          showgrid: false,
          zeroline: false,
          tickformat: "%m.%d %H:%M",
          nticks: 6,
          fixedrange: true,
          range: [rows[0].time, rows[rows.length - 1].time]
        },
        yaxis: {
          side: "left",
          showgrid: true,
          gridcolor: "#e5ebf3",
          griddash: "dot",
          zeroline: false,
          tickformat: ",.2f",
          fixedrange: true,
          range
        }
      }, { responsive: true, displayModeBar: false, displaylogo: false });
    }

    async function loadData() {
      try {
        const response = await fetch(`data.json?t=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error("data.json을 불러오지 못했습니다.");

        const data = await response.json();
        const isDown = Number(data.changeRate) < 0;
        document.getElementById("title").textContent = data.title || "코스피 야간선물";
        document.getElementById("statusText").textContent = data.statusText || "야간선물 데이터";

        const price = document.getElementById("price");
        price.textContent = Number(data.price) ? nf.format(data.price) : "—";
        price.classList.toggle("down", isDown);

        const change = document.getElementById("change");
        change.textContent = Number(data.price)
          ? `${arrow(data.changeRate)} ${Math.abs(Number(data.change)).toLocaleString("ko-KR", { maximumFractionDigits: 2 })} (${signed(data.changeRate)}%)`
          : "—";
        change.classList.toggle("down", isDown);

        document.getElementById("updatedAt").textContent = `마지막 갱신: ${data.updatedAt}`;
        document.getElementById("period").textContent = data.pointCount
          ? `원본 전체 기간 · ${Number(data.pointCount).toLocaleString("ko-KR")}개`
          : "원본 전체 기간";

        renderChart(data);
      } catch (error) {
        document.getElementById("dashboard").innerHTML = `<div class="error"><b>야간선물 데이터를 표시하지 못했습니다.</b><br>${error.message}</div>`;
      }
    }

    loadData();
  </script>
</body>
</html>
