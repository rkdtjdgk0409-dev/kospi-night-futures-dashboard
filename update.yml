name: 코스피 야간선물 데이터 자동 갱신

on:
  workflow_dispatch:

  schedule:
    # 한국시간 18:02~23:57, 5분마다
    - cron: "2-57/5 18-23 * * *"
      timezone: "Asia/Seoul"

    # 한국시간 00:02~05:57, 5분마다
    - cron: "2-57/5 0-5 * * *"
      timezone: "Asia/Seoul"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: kospi-night-futures-data
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 파일 가져오기
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 준비
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 필요한 도구 설치
        run: pip install -r requirements.txt

      - name: 야간선물 숫자 데이터 가져오기
        run: python update.py

      - name: 갱신 데이터를 저장소에 누적
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "코스피 야간선물 데이터 갱신"
          git push

      - name: 배포 폴더 만들기
        run: |
          mkdir -p site
          cp index.html data.json site/
          touch site/.nojekyll

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v6

      - name: Pages 파일 업로드
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
