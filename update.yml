name: 코스피 야간선물 자동 갱신

on:
  workflow_dispatch:

  schedule:
    # 매일 매시 00분과 30분에 실행
    - cron: "0,30 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: kospi-night-futures-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 파일 가져오기
        uses: actions/checkout@v4

      - name: Python 준비
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 필요한 도구 설치
        run: pip install -r requirements.txt

      - name: 코스피 야간선물 패널 가져오기
        run: python update.py

      - name: 배포 폴더 만들기
        run: |
          mkdir -p site
          cp index.html data.json panel.png site/
          touch site/.nojekyll

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v5

      - name: Pages 파일 업로드
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
