name: 코스피 야간선물 자동 갱신

on:
  workflow_dispatch:

  schedule:
    # KST 18:02~익일 05:57, 5분마다 실행합니다.
    # GitHub Actions의 cron은 UTC 기준이므로 KST보다 9시간 뺍니다.
    - cron: "2-57/5 9-20 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: kospi-night-futures-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 파일 가져오기
        uses: actions/checkout@v4

      - name: Python 준비
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 필요한 도구 설치
        run: pip install -r requirements.txt

      - name: 원본 전체 차트 데이터 가져오기
        run: python update.py

      - name: 배포 폴더 만들기
        run: |
          mkdir -p site
          cp index.html data.json .nojekyll site/

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v5

      - name: Pages 파일 업로드
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4

